name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out plaincloak-py
        uses: actions/checkout@v4
        with:
          path: plaincloak-py

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync vendored schemas and vectors
        working-directory: plaincloak-py
        run: python scripts/sync_vectors.py

      - name: Install (with extras)
        working-directory: plaincloak-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[keystore,dev]"

      - name: Lint (ruff)
        working-directory: plaincloak-py
        run: ruff check src tests

      - name: Type-check (mypy)
        working-directory: plaincloak-py
        run: mypy

      - name: Test (pytest)
        working-directory: plaincloak-py
        run: pytest -q

      - name: Drift check (vendored vs spec)
        working-directory: plaincloak-py
        run: python scripts/sync_vectors.py --check

  qr:
    name: QR extra (libzbar0)
    runs-on: ubuntu-latest
    steps:
      - name: Check out plaincloak-py
        uses: actions/checkout@v4
        with:
          path: plaincloak-py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install libzbar0
        run: sudo apt-get install -y libzbar0

      - name: Sync vendored schemas and vectors
        working-directory: plaincloak-py
        run: python scripts/sync_vectors.py

      - name: Install (with qr extra)
        working-directory: plaincloak-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[keystore,qr,dev]"

      - name: Test QR
        working-directory: plaincloak-py
        run: pytest -q tests/unit/test_qr.py

  no-extras:
    name: Base install (no extras, PBKDF2 fallback)
    runs-on: ubuntu-latest
    steps:
      - name: Check out plaincloak-py
        uses: actions/checkout@v4
        with:
          path: plaincloak-py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync vendored schemas and vectors
        working-directory: plaincloak-py
        run: python scripts/sync_vectors.py

      - name: Install (no extras)
        working-directory: plaincloak-py
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      # No argon2-cffi: keygen/keystore must still work via the PBKDF2
      # fallback, and the CLI must be importable.
      - name: Smoke (CLI + PBKDF2 keystore)
        working-directory: plaincloak-py
        run: |
          python -m plaincloak --help
          pytest -q tests/unit/test_keystore.py tests/integration/test_module_entry.py
